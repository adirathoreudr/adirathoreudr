<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <rect width="800" height="160" fill="#0D1117"/>
  <style>
    text { font-family: monospace; font-size: 13px; fill: #00FF41; animation: fall linear infinite; opacity: 0; }
    @keyframes fall {
      0%   { transform: translateY(-20px); opacity: 0; }
      5%   { opacity: 0.9; }
      80%  { opacity: 0.5; }
      100% { transform: translateY(170px); opacity: 0; }
    }
    .c0  { animation-duration:2.1s; animation-delay:0.0s; }
    .c1  { animation-duration:1.8s; animation-delay:0.3s; }
    .c2  { animation-duration:2.4s; animation-delay:0.6s; }
    .c3  { animation-duration:1.6s; animation-delay:0.1s; }
    .c4  { animation-duration:2.2s; animation-delay:0.8s; }
    .c5  { animation-duration:1.9s; animation-delay:0.4s; }
    .c6  { animation-duration:2.5s; animation-delay:1.1s; }
    .c7  { animation-duration:1.7s; animation-delay:0.7s; }
    .c8  { animation-duration:2.0s; animation-delay:0.2s; }
    .c9  { animation-duration:2.3s; animation-delay:0.9s; }
    .c10 { animation-duration:1.5s; animation-delay:1.3s; }
    .c11 { animation-duration:2.6s; animation-delay:0.5s; }
    .c12 { animation-duration:1.8s; animation-delay:1.0s; }
    .c13 { animation-duration:2.1s; animation-delay:1.4s; }
    .c14 { animation-duration:1.6s; animation-delay:0.3s; }
    .c15 { animation-duration:2.4s; animation-delay:1.6s; }
    .c16 { animation-duration:2.0s; animation-delay:0.8s; }
    .c17 { animation-duration:1.7s; animation-delay:1.2s; }
    .c18 { animation-duration:2.2s; animation-delay:0.6s; }
    .c19 { animation-duration:1.9s; animation-delay:1.7s; }
    .bright { fill: #7FFF7F; }
  </style>

