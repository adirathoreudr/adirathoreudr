<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <rect width="320" height="120" fill="#0D1117"/>
  <style>
    @keyframes type { from{width:0} to{width:100%} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:0.95} 94%{opacity:0.6} 96%{opacity:1} }
    .line1 { animation: type 1.8s steps(30,end) 0.2s both; overflow:hidden; white-space:nowrap; width:0; }
    .line2 { animation: type 1.8s steps(30,end) 2.2s both; overflow:hidden; white-space:nowrap; width:0; }
    .line3 { animation: type 1.8s steps(30,end) 4.2s both; overflow:hidden; white-space:nowrap; width:0; }
    .cursor { animation: blink 0.8s infinite; }
    .screen { animation: flicker 8s infinite; }
    text { font-family: monospace; font-size: 13px; fill: #00FF41; }
    .dim { fill: #006620; }
  </style>
  <g class="screen">
    <!-- border -->
    <rect x="2" y="2" width="316" height="116" fill="none" stroke="#00FF41" stroke-width="1" opacity="0.4"/>
    <!-- lines -->
    <text x="12" y="30"  class="dim">// session terminating...</text>
    <text x="12" y="52"  class="line1">&gt; SYSTEMS NOMINAL. STANDING BY.</text>
    <text x="12" y="72"  class="line2">&gt; NEXT COMMIT: IMMINENT.</text>
    <text x="12" y="92"  class="line3">&gt; adirathoreudr@github ~ $</text>
    <rect class="cursor" x="260" y="80" width="8" height="12" fill="#00FF41"/>
  </g>
</svg>
